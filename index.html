<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bitácora</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Bitácora">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --border: #222228;
    --accent: #c8a96e;
    --accent-dim: #7a6440;
    --text: #d4cfc8;
    --text-dim: #6b6760;
    --red: #c46a5a;
    --green: #6a9e7a;
    --blue: #5a7fa0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* NAV */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 10px 4px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    text-transform: uppercase;
  }

  nav button.active { color: var(--accent); }
  nav button svg { width: 20px; height: 20px; }

  /* HEADER */
  header {
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .date-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  /* PAGES */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* SECTION TITLE */
  .sec-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    margin-top: 24px;
  }
  .sec-title:first-child { margin-top: 0; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 10px;
  }

  /* INPUTS */
  input, textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent-dim);
  }

  textarea {
    resize: none;
    min-height: 90px;
    line-height: 1.5;
  }

  select option { background: #1a1a1e; }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .input-row.triple {
    grid-template-columns: 1fr 1fr 1fr;
  }

  label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 5px;
  }

  /* BUTTONS */
  .btn {
    background: none;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
    margin-top: 8px;
  }

  .btn:active { background: rgba(200,169,110,0.08); }

  .btn-sm {
    padding: 6px 10px;
    font-size: 9px;
    width: auto;
    margin-top: 0;
  }

  /* MONEY */
  .balance-display {
    text-align: center;
    padding: 20px 0 12px;
  }

  .balance-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .balance-amount {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.01em;
  }

  .balance-amount.pos { color: var(--green); }
  .balance-amount.neg { color: var(--red); }

  .mini-totals {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 8px;
  }

  .mini-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  .mini-total span { color: var(--text-dim); font-size: 8px; display: block; letter-spacing: 0.1em; }

  .tx-list { margin-top: 4px; }

  .tx-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .tx-item:last-child { border-bottom: none; }

  .tx-desc { font-size: 15px; flex: 1; }
  .tx-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tx-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    white-space: nowrap;
  }

  .tx-amount.ingreso { color: var(--green); }
  .tx-amount.gasto { color: var(--red); }

  .tx-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    line-height: 1;
  }

  /* PILLS */
  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .pill {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pill.selected {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(200,169,110,0.06);
  }

  /* PENDIENTES */
  .pend-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .pend-item:last-child { border-bottom: none; }

  .pend-check {
    width: 18px;
    height: 18px;
    border: 1px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.2s;
  }

  .pend-check.done {
    border-color: var(--accent-dim);
    background: rgba(200,169,110,0.1);
    color: var(--accent);
  }

  .pend-body { flex: 1; }

  .pend-text {
    font-size: 15px;
    line-height: 1.4;
  }

  .pend-text.done-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .pend-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }

  .pend-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    flex-shrink: 0;
  }

  /* BITÁCORA */
  .entry-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .entry-item:last-child { border-bottom: none; }

  .entry-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .entry-text {
    font-size: 15px;
    line-height: 1.6;
    font-style: italic;
    color: var(--text);
  }

  .entry-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0;
  }

  /* CUERPO */
  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }

  .metric-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .metric-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* TURNOS */
  .turno-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .turno-item:last-child { border-bottom: none; }

  .turno-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
  }

  .turno-badge.mañana { background: rgba(106,158,122,0.15); color: var(--green); }
  .turno-badge.tarde { background: rgba(200,169,110,0.12); color: var(--accent); }
  .turno-badge.noche { background: rgba(90,127,160,0.15); color: var(--blue); }
  .turno-badge.pinche { background: rgba(196,106,90,0.12); color: var(--red); }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 30px 0;
  }

  .mb8 { margin-bottom: 8px; }
  .mb12 { margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="date-line" id="headerDate"></div>
  <h1>Bitácora</h1>
</header>

<!-- NAV -->
<nav>
  <button class="active" onclick="showPage('dinero')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
    Dinero
  </button>
  <button onclick="showPage('tiempo')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Tiempo
  </button>
  <button onclick="showPage('pendientes')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Tareas
  </button>
  <button onclick="showPage('cuerpo')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Cuerpo
  </button>
  <button onclick="showPage('bitacora')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Notas
  </button>
</nav>

<!-- DINERO -->
<div class="page active" id="page-dinero">
  <div class="balance-display">
    <div class="balance-label">Balance del mes</div>
    <div class="balance-amount" id="balanceDisplay">$0</div>
    <div class="mini-totals">
      <div class="mini-total" style="color:var(--green)">
        <span>Ingresos</span>
        <span id="totalIngresos">$0</span>
      </div>
      <div class="mini-total" style="color:var(--red)">
        <span>Gastos</span>
        <span id="totalGastos">$0</span>
      </div>
    </div>
  </div>

  <div class="sec-title">Registrar movimiento</div>
  <div class="card">
    <div class="pill-row" id="tipoPills">
      <button class="pill selected" onclick="selectTipo('ingreso')">+ Ingreso</button>
      <button class="pill" onclick="selectTipo('gasto')">− Gasto</button>
    </div>
    <div class="mb8">
      <label>Descripción</label>
      <input type="text" id="txDesc" placeholder="ej: turno mañana, mercado...">
    </div>
    <div class="input-row">
      <div>
        <label>Monto (CLP)</label>
        <input type="number" id="txMonto" placeholder="0">
      </div>
      <div>
        <label>Categoría</label>
        <select id="txCat">
          <option value="puerto">Puerto</option>
          <option value="alimentacion">Alimentación</option>
          <option value="transporte">Transporte</option>
          <option value="legal">Legal</option>
          <option value="hogar">Hogar</option>
          <option value="salud">Salud</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
    <button class="btn" onclick="addTx()">Registrar</button>
  </div>

  <div class="sec-title">Movimientos</div>
  <div class="card">
    <div class="tx-list" id="txList">
      <div class="empty-state">Sin movimientos aún</div>
    </div>
  </div>
</div>

<!-- TIEMPO -->
<div class="page" id="page-tiempo">
  <div class="sec-title">Registrar turno</div>
  <div class="card">
    <div class="mb8">
      <label>Fecha</label>
      <input type="date" id="turnoFecha">
    </div>
    <div class="input-row">
      <div>
        <label>Tipo</label>
        <select id="turnoTipo">
          <option value="mañana">Mañana</option>
          <option value="tarde">Tarde</option>
          <option value="noche">Noche</option>
          <option value="pinche">Pinché</option>
        </select>
      </div>
      <div>
        <label>Estado</label>
        <select id="turnoEstado">
          <option value="nombrado">Nombrado</option>
          <option value="pendiente">Pendiente</option>
          <option value="trabajado">Trabajado</option>
        </select>
      </div>
    </div>
    <div class="mb8">
      <label>Nota (opcional)</label>
      <input type="text" id="turnoNota" placeholder="ej: faena, nave...">
    </div>
    <button class="btn" onclick="addTurno()">Agregar turno</button>
  </div>

  <div class="sec-title">Turnos registrados</div>
  <div class="card">
    <div id="turnoList"><div class="empty-state">Sin turnos</div></div>
  </div>
</div>

<!-- PENDIENTES -->
<div class="page" id="page-pendientes">
  <div class="sec-title">Agregar tarea</div>
  <div class="card">
    <div class="mb8">
      <label>Tarea</label>
      <input type="text" id="pendText" placeholder="ej: llamar a CAJ, pagar cuenta...">
    </div>
    <div class="input-row">
      <div>
        <label>Área</label>
        <select id="pendArea">
          <option value="legal">Legal</option>
          <option value="trabajo">Trabajo</option>
          <option value="hogar">Hogar</option>
          <option value="salud">Salud</option>
          <option value="personal">Personal</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div>
        <label>Fecha límite</label>
        <input type="date" id="pendFecha">
      </div>
    </div>
    <button class="btn" onclick="addPend()">Agregar</button>
  </div>

  <div class="sec-title">Pendientes</div>
  <div class="card">
    <div id="pendList"><div class="empty-state">Sin pendientes</div></div>
  </div>
</div>

<!-- CUERPO -->
<div class="page" id="page-cuerpo">
  <div class="sec-title">Registro de hoy</div>
  <div class="card">
    <div class="input-row">
      <div>
        <label>Peso (kg)</label>
        <input type="number" id="cPeso" placeholder="0.0" step="0.1">
      </div>
      <div>
        <label>Horas dormidas</label>
        <input type="number" id="cSueño" placeholder="0" step="0.5">
      </div>
    </div>
    <div class="mb8">
      <label>Ejercicio realizado</label>
      <input type="text" id="cEjercicio" placeholder="ej: caminata 30min, flexiones...">
    </div>
    <div class="mb8">
      <label>Alimentación del día</label>
      <textarea id="cDieta" placeholder="ej: desayuno, almuerzo, cena..."></textarea>
    </div>
    <div class="mb8">
      <label>Estado general</label>
      <div class="pill-row" id="estadoPills">
        <button class="pill" onclick="selectEstado('bien')">Bien</button>
        <button class="pill" onclick="selectEstado('regular')">Regular</button>
        <button class="pill" onclick="selectEstado('cansado')">Cansado</button>
        <button class="pill" onclick="selectEstado('estresado')">Estresado</button>
      </div>
    </div>
    <button class="btn" onclick="addCuerpo()">Guardar día</button>
  </div>

  <div class="sec-title">Últimos registros</div>
  <div class="card" id="cuerpoList">
    <div class="empty-state">Sin registros</div>
  </div>
</div>

<!-- BITÁCORA -->
<div class="page" id="page-bitacora">
  <div class="sec-title">Nueva nota</div>
  <div class="card">
    <textarea id="notaText" placeholder="Escribe lo que necesites — ideas, observaciones, lo que sea..." style="min-height:120px"></textarea>
    <button class="btn" onclick="addNota()">Guardar nota</button>
  </div>

  <div class="sec-title">Notas anteriores</div>
  <div class="card" id="notaList">
    <div class="empty-state">Sin notas</div>
  </div>
</div>

<script>
// STATE
let state = JSON.parse(localStorage.getItem('bitacora_v1') || '{"txs":[],"turnos":[],"pends":[],"cuerpo":[],"notas":[]}');
let currentTipo = 'ingreso';
let currentEstado = '';

function save() {
  localStorage.setItem('bitacora_v1', JSON.stringify(state));
}

// DATE
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

// Header date
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('es-CL', {
  weekday:'long', day:'numeric', month:'long'
});

// Set default dates
document.getElementById('turnoFecha').value = todayISO();
document.getElementById('pendFecha').value = todayISO();

// NAV
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
  render();
}

// TIPO PILLS
function selectTipo(tipo) {
  currentTipo = tipo;
  document.querySelectorAll('#tipoPills .pill').forEach(p => p.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function selectEstado(est) {
  currentEstado = est;
  document.querySelectorAll('#estadoPills .pill').forEach(p => p.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

// FORMAT CLP
function fmtCLP(n) {
  return '$' + Math.abs(n).toLocaleString('es-CL');
}

// DINERO
function addTx() {
  const desc = document.getElementById('txDesc').value.trim();
  const monto = parseFloat(document.getElementById('txMonto').value);
  const cat = document.getElementById('txCat').value;
  if (!desc || !monto) return;
  state.txs.unshift({ id: Date.now(), desc, monto, tipo: currentTipo, cat, fecha: todayISO() });
  document.getElementById('txDesc').value = '';
  document.getElementById('txMonto').value = '';
  save();
  renderDinero();
}

function delTx(id) {
  state.txs = state.txs.filter(t => t.id !== id);
  save(); renderDinero();
}

function renderDinero() {
  const ingresos = state.txs.filter(t => t.tipo === 'ingreso').reduce((a, t) => a + t.monto, 0);
  const gastos = state.txs.filter(t => t.tipo === 'gasto').reduce((a, t) => a + t.monto, 0);
  const bal = ingresos - gastos;
  const balEl = document.getElementById('balanceDisplay');
  balEl.textContent = fmtCLP(bal);
  balEl.className = 'balance-amount ' + (bal >= 0 ? 'pos' : 'neg');
  document.getElementById('totalIngresos').textContent = fmtCLP(ingresos);
  document.getElementById('totalGastos').textContent = fmtCLP(gastos);

  const list = document.getElementById('txList');
  if (!state.txs.length) { list.innerHTML = '<div class="empty-state">Sin movimientos aún</div>'; return; }
  list.innerHTML = state.txs.map(t => `
    <div class="tx-item">
      <div class="tx-body" style="flex:1">
        <div class="tx-desc">${t.desc}</div>
        <div class="tx-cat">${t.cat} · ${formatDate(t.fecha)}</div>
      </div>
      <div class="tx-amount ${t.tipo === 'ingreso' ? 'ingreso' : 'gasto'}">${t.tipo === 'ingreso' ? '+' : '−'}${fmtCLP(t.monto)}</div>
      <button class="tx-del" onclick="delTx(${t.id})">×</button>
    </div>
  `).join('');
}

// TURNOS
function addTurno() {
  const fecha = document.getElementById('turnoFecha').value;
  const tipo = document.getElementById('turnoTipo').value;
  const estado = document.getElementById('turnoEstado').value;
  const nota = document.getElementById('turnoNota').value.trim();
  if (!fecha) return;
  state.turnos.unshift({ id: Date.now(), fecha, tipo, estado, nota });
  document.getElementById('turnoNota').value = '';
  save(); renderTiempo();
}

function delTurno(id) {
  state.turnos = state.turnos.filter(t => t.id !== id);
  save(); renderTiempo();
}

function renderTiempo() {
  const list = document.getElementById('turnoList');
  if (!state.turnos.length) { list.innerHTML = '<div class="empty-state">Sin turnos</div>'; return; }
  list.innerHTML = state.turnos.map(t => `
    <div class="turno-item">
      <div>
        <div style="font-size:15px;margin-bottom:2px">${formatDate(t.fecha)}${t.nota ? ' — ' + t.nota : ''}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em">${t.estado}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="turno-badge ${t.tipo}">${t.tipo}</span>
        <button class="tx-del" onclick="delTurno(${t.id})">×</button>
      </div>
    </div>
  `).join('');
}

// PENDIENTES
function addPend() {
  const text = document.getElementById('pendText').value.trim();
  const area = document.getElementById('pendArea').value;
  const fecha = document.getElementById('pendFecha').value;
  if (!text) return;
  state.pends.unshift({ id: Date.now(), text, area, fecha, done: false });
  document.getElementById('pendText').value = '';
  save(); renderPends();
}

function togglePend(id) {
  const p = state.pends.find(p => p.id === id);
  if (p) p.done = !p.done;
  save(); renderPends();
}

function delPend(id) {
  state.pends = state.pends.filter(p => p.id !== id);
  save(); renderPends();
}

function renderPends() {
  const list = document.getElementById('pendList');
  if (!state.pends.length) { list.innerHTML = '<div class="empty-state">Sin pendientes</div>'; return; }
  const sorted = [...state.pends].sort((a, b) => a.done - b.done);
  list.innerHTML = sorted.map(p => `
    <div class="pend-item">
      <div class="pend-check ${p.done ? 'done' : ''}" onclick="togglePend(${p.id})">${p.done ? '✓' : ''}</div>
      <div class="pend-body">
        <div class="pend-text ${p.done ? 'done-text' : ''}">${p.text}</div>
        <div class="pend-meta">${p.area}${p.fecha ? ' · ' + formatDate(p.fecha) : ''}</div>
      </div>
      <button class="pend-del" onclick="delPend(${p.id})">×</button>
    </div>
  `).join('');
}

// CUERPO
function addCuerpo() {
  const peso = document.getElementById('cPeso').value;
  const sueño = document.getElementById('cSueño').value;
  const ejercicio = document.getElementById('cEjercicio').value.trim();
  const dieta = document.getElementById('cDieta').value.trim();
  if (!peso && !ejercicio && !dieta) return;
  state.cuerpo.unshift({ id: Date.now(), fecha: todayISO(), peso, sueño, ejercicio, dieta, estado: currentEstado });
  document.getElementById('cPeso').value = '';
  document.getElementById('cSueño').value = '';
  document.getElementById('cEjercicio').value = '';
  document.getElementById('cDieta').value = '';
  document.querySelectorAll('#estadoPills .pill').forEach(p => p.classList.remove('selected'));
  currentEstado = '';
  save(); renderCuerpo();
}

function delCuerpo(id) {
  state.cuerpo = state.cuerpo.filter(c => c.id !== id);
  save(); renderCuerpo();
}

function renderCuerpo() {
  const list = document.getElementById('cuerpoList');
  if (!state.cuerpo.length) { list.innerHTML = '<div class="empty-state">Sin registros</div>'; return; }
  list.innerHTML = state.cuerpo.slice(0, 10).map(c => `
    <div class="pend-item">
      <div class="pend-body">
        <div class="pend-meta" style="margin-bottom:4px">${formatDate(c.fecha)}${c.estado ? ' · ' + c.estado : ''}</div>
        ${c.peso ? `<div style="font-size:14px">Peso: <strong style="color:var(--accent)">${c.peso} kg</strong>${c.sueño ? ` · Sueño: ${c.sueño}h` : ''}</div>` : ''}
        ${c.ejercicio ? `<div style="font-size:13px;color:var(--text-dim);margin-top:2px">Ej: ${c.ejercicio}</div>` : ''}
        ${c.dieta ? `<div style="font-size:13px;color:var(--text-dim);margin-top:2px">Dieta: ${c.dieta}</div>` : ''}
      </div>
      <button class="pend-del" onclick="delCuerpo(${c.id})">×</button>
    </div>
  `).join('');
}

// NOTAS
function addNota() {
  const text = document.getElementById('notaText').value.trim();
  if (!text) return;
  state.notas.unshift({ id: Date.now(), text, fecha: new Date().toISOString() });
  document.getElementById('notaText').value = '';
  save(); renderNotas();
}

function delNota(id) {
  state.notas = state.notas.filter(n => n.id !== id);
  save(); renderNotas();
}

function renderNotas() {
  const list = document.getElementById('notaList');
  if (!state.notas.length) { list.innerHTML = '<div class="empty-state">Sin notas</div>'; return; }
  list.innerHTML = state.notas.map(n => `
    <div class="entry-item">
      <div class="entry-date">${new Date(n.fecha).toLocaleString('es-CL', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
      <div class="entry-text">${n.text.replace(/\n/g, '<br>')}</div>
      <button class="entry-del" onclick="delNota(${n.id})">borrar</button>
    </div>
  `).join('');
}

function render() {
  renderDinero();
  renderTiempo();
  renderPends();
  renderCuerpo();
  renderNotas();
}

render();
</script>
</body>
</html>
